server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache longo para assets versionados (hash no nome)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
